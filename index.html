<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروکسی ساده - باز کردن در تب جدید</title>
    <style>
        body {
            font-family: Tahoma, Arial;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        input {
            flex: 4;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
        }
        input:focus {
            border-color: #1e3c72;
        }
        select {
            flex: 1;
            padding: 15px;
            font-size: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
        }
        button {
            flex: 1;
            padding: 15px 25px;
            font-size: 16px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #2a5298;
        }
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .quick-links a {
            background: #e0e0e0;
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .quick-links a:hover {
            background: #1e3c72;
            color: white;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }
        .info {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 پروکسی سریع و رایگان</h1>
        <p>آدرس سایت رو وارد کن، توی تب جدید باز میشه</p>
        
        <div class="search-box">
            <input type="text" id="urlInput" placeholder="مثال: youtube.com یا google.com">
            <select id="proxySelect">
                <option value="proxy1">سرور 1 (سریع)</option>
                <option value="proxy2">سرور 2 (پایدار)</option>
                <option value="proxy3">سرور 3 (پشتیبان)</option>
            </select>
            <button onclick="goToSite()">🚀 برو</button>
        </div>
        
        <div class="quick-links">
            <a onclick="quickGo('youtube.com')">🎬 یوتیوب</a>
            <a onclick="quickGo('google.com')">🔍 گوگل</a>
            <a onclick="quickGo('instagram.com')">📸 اینستاگرام</a>
            <a onclick="quickGo('github.com')">💻 گیت‌هاب</a>
            <a onclick="quickGo('aparat.com')">📹 آپارات</a>
            <a onclick="quickGo('twitter.com')">🐦 ایکس</a>
        </div>
        
        <div class="status" id="statusBar" style="background:#e8f5e9; color:#2e7d32;">
            ✅ آماده | آدرس رو وارد کن و بزن برو
        </div>
        
        <div class="info">
            🔒 حریم خصوصی محترم است • بدون نیاز به نصب • کاملاً رایگان
        </div>
    </div>

    <script>
        const proxies = {
            proxy1: 'https://cors-anywhere.herokuapp.com/',
            proxy2: 'https://corsproxy.io/?',
            proxy3: 'https://api.allorigins.win/get?url='
        };
        
        function updateStatus(msg, isError = false) {
            let bar = document.getElementById('statusBar');
            bar.innerHTML = msg;
            if (isError) {
                bar.style.background = '#ffebee';
                bar.style.color = '#c62828';
            } else {
                bar.style.background = '#e8f5e9';
                bar.style.color = '#2e7d32';
            }
        }
        
        function goToSite() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) {
                updateStatus('⚠️ لطفاً یک آدرس وارد کن!', true);
                return;
            }
            
            // حذف http:// یا https:// اضافی
            url = url.replace(/^https?:\/\//, '');
            
            let fullUrl = 'https://' + url;
            let selectedProxy = document.getElementById('proxySelect').value;
            let proxyUrl = '';
            
            updateStatus('🔄 در حال ساخت لینک پروکسی...');
            
            if (selectedProxy === 'proxy3') {
                // برای allorigins باید فرق کنه
                proxyUrl = proxies.proxy3 + encodeURIComponent(fullUrl);
                // این یکی رو با fetch میبریم
                fetch(proxyUrl)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.contents) {
                            let newWin = window.open();
                            newWin.document.write(data.contents);
                            updateStatus('✅ در تب جدید باز شد!');
                        } else {
                            throw new Error('خطا');
                        }
                    })
                    .catch(err => {
                        updateStatus('❌ این سرور جواب نداد. سرور دیگه‌ای انتخاب کن.', true);
                    });
            } else {
                if (selectedProxy === 'proxy1') {
                    proxyUrl = proxies.proxy1 + fullUrl;
                } else {
                    proxyUrl = proxies.proxy2 + fullUrl;
                }
                // باز کردن در تب جدید
                window.open(proxyUrl, '_blank');
                updateStatus('✅ لینک در تب جدید باز شد!');
            }
        }
        
        function quickGo(site) {
            document.getElementById('urlInput').value = site;
            goToSite();
        }
        
        // با زدن Enter
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                goToSite();
            }
        });
    </script>
</body>
</html>
